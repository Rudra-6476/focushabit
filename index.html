<style>
:root{
  --bg:#0a0b0f;--surface:#12141a;--surface2:#1a1d26;--border:#242736;
  --accent:#6c63ff;--accent2:#ff6584;--accent3:#43e6b0;--accent4:#ffd166;
  --text:#eeeef5;--muted:#7a7d95;--radius:14px;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}
#root{height:100%}
button{cursor:pointer;font-family:var(--font-body);border:none;outline:none}
input,select,textarea{font-family:var(--font-body);color:var(--text)}
select option{background:var(--surface2);color:var(--text)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* INSTALL BANNER */
.install-banner{position:fixed;bottom:0;left:0;right:0;z-index:8888;background:linear-gradient(135deg,#1a1550,#0d2b1f);border-top:1px solid var(--accent);padding:14px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 -8px 32px rgba(0,0,0,.5);animation:slideUp .35s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.install-banner-icon{font-size:2rem;flex-shrink:0}
.install-banner-text{flex:1;min-width:0}
.install-banner-title{font-family:var(--font-head);font-weight:700;font-size:.95rem;margin-bottom:2px}
.install-banner-sub{font-size:.78rem;color:var(--muted)}
.install-banner-btns{display:flex;gap:8px;flex-shrink:0}
.install-banner-btn{padding:9px 18px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);white-space:nowrap}
.install-banner-btn.primary{background:var(--accent);color:#fff}
.install-banner-btn.sec{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
@media(max-width:500px){.install-banner{flex-wrap:wrap}.install-banner-btns{width:100%;justify-content:flex-end}}

/* INSTALL CARD */
.install-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
.install-step:last-child{border-bottom:none}
.install-step-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.install-step-text{font-size:.87rem;line-height:1.5}
.install-step-text b{color:var(--text)}
.install-step-text span{color:var(--muted)}
.platform-tab{padding:7px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .18s}
.platform-tab.act{background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accent)}

/* THEMES */
body.theme-light{--bg:#f0f2f8;--surface:#ffffff;--surface2:#e8eaf2;--border:#d0d4e8;--text:#1a1d2e;--muted:#6b6f8a}
body.theme-purple{--bg:#0d0a1a;--surface:#16102a;--surface2:#1e1738;--border:#2e2550;--accent:#a78bfa}
body.theme-green{--bg:#060f0a;--surface:#0d1f14;--surface2:#132a1c;--border:#1e3d28;--accent:#34d399;--accent3:#6ee7b7}
body.theme-ocean{--bg:#060d14;--surface:#0c1a24;--surface2:#122333;--border:#1a3347;--accent:#38bdf8;--accent3:#7dd3fc}
body.theme-sunset{--bg:#100808;--surface:#1c1010;--surface2:#261616;--border:#3d1f1f;--accent:#fb923c;--accent2:#f472b6;--accent3:#fbbf24}

/* TODO */
.todo-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface2);border-radius:10px;margin-bottom:7px;border:1px solid var(--border);transition:opacity .2s}
.todo-item.done{opacity:.5}
.todo-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s}
.todo-cb.checked{background:var(--accent3);border-color:var(--accent3);color:#000}
.todo-text{flex:1;font-size:.9rem;font-weight:500}
.todo-text.done{text-decoration:line-through;color:var(--muted)}
.priority-badge{padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:700;flex-shrink:0}
.p-high{background:rgba(255,101,132,.15);color:var(--accent2);border:1px solid rgba(255,101,132,.3)}
.p-med{background:rgba(255,209,102,.15);color:var(--accent4);border:1px solid rgba(255,209,102,.3)}
.p-low{background:rgba(67,230,176,.15);color:var(--accent3);border:1px solid rgba(67,230,176,.3)}

/* GOALS */
.goal-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.goal-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.goal-icon{font-size:1.4rem}
.goal-title-text{font-family:var(--font-head);font-weight:700;font-size:.95rem;flex:1}
.goal-deadline{font-size:.75rem;color:var(--muted)}
.goal-progress-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px}
.goal-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .4s ease}
.milestone-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.83rem;color:var(--muted);border-bottom:1px solid var(--border)}
.milestone-item:last-child{border-bottom:none}
.milestone-cb{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .15s}
.milestone-cb.done{background:var(--accent);border-color:var(--accent);color:#fff}

/* REPORTS */
.report-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.report-bar-label{font-size:.78rem;color:var(--muted);width:32px;text-align:right;flex-shrink:0}
.report-bar-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.report-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .5s ease}
.report-bar-val{font-size:.75rem;color:var(--muted);width:28px;flex-shrink:0}
.report-tab{padding:6px 14px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .18s}
.report-tab.act{background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accent)}

/* REMINDERS */
.reminder-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)}
.reminder-icon{font-size:1.3rem;flex-shrink:0}
.reminder-info{flex:1}
.reminder-title{font-size:.88rem;font-weight:600}
.reminder-time{font-size:.76rem;color:var(--muted);margin-top:2px}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle-on .toggle-slider{background:var(--accent)}
.toggle-on .toggle-slider:before{transform:translateX(18px)}

/* THEME PICKER */
.theme-swatch{width:48px;height:48px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .18s;flex-shrink:0}
.theme-swatch.act{border-color:var(--text);transform:scale(1.15)}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:.84rem;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;pointer-events:auto}
.toast.success{border-left:3px solid var(--accent3)}
.toast.info{border-left:3px solid var(--accent)}
.toast.warn{border-left:3px solid var(--accent4)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ONBOARDING */
.ob-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;background:radial-gradient(ellipse at 20% 40%,#1a1550 0%,transparent 60%),radial-gradient(ellipse at 80% 70%,#0d2b1f 0%,transparent 60%),var(--bg)}
.ob-logo{font-family:var(--font-head);font-size:2.2rem;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.ob-logo span{color:var(--accent)}
.ob-subtitle{color:var(--muted);font-size:.95rem;margin-bottom:32px;text-align:center}
.ob-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.ob-title{font-family:var(--font-head);font-size:1.5rem;font-weight:700;margin-bottom:6px}
.ob-desc{color:var(--muted);font-size:.88rem;margin-bottom:22px}
.ob-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem;padding:12px 14px;outline:none;transition:border .2s;margin-bottom:10px}
.ob-input:focus{border-color:var(--accent)}
.ob-btn{width:100%;background:var(--accent);color:#fff;border-radius:10px;font-size:.95rem;font-weight:600;padding:13px;margin-top:10px;transition:opacity .2s,transform .15s}
.ob-btn:hover{opacity:.9;transform:translateY(-1px)}
.ob-btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.ob-step{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s}
.ob-dot.act{background:var(--accent)}
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.goal-chip{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;font-size:.85rem;cursor:pointer;transition:all .2s;font-weight:500}
.goal-chip.sel{border-color:var(--accent);background:rgba(108,99,255,.15);color:var(--accent)}

/* SHELL */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0}
.sidebar-logo{font-family:var(--font-head);font-weight:800;font-size:1.25rem;padding:0 20px;margin-bottom:28px;letter-spacing:-.5px}
.sidebar-logo span{color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;border-left:3px solid transparent;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.act{color:var(--accent);border-left-color:var(--accent);background:rgba(108,99,255,.08)}
.nav-icon{font-size:1.1rem;width:20px;text-align:center}
.main-content{flex:1;overflow-y:auto;background:var(--bg);padding:28px}
.page-header{margin-bottom:24px}
.page-title{font-family:var(--font-head);font-size:1.8rem;font-weight:700;letter-spacing:-.5px}
.page-sub{color:var(--muted);font-size:.9rem;margin-top:4px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* STAT CARDS */
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:5px}
.stat-value{font-family:var(--font-head);font-size:2rem;font-weight:800}
.stat-label{color:var(--muted);font-size:.8rem;font-weight:500}
.stat-sub{font-size:.72rem;color:var(--muted)}

/* HABITS */
.habit-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)}

const {useState,useEffect,useRef,useContext,createContext,useCallback}=React;

// LOCALSTORAGE DATABASE
// All data is persisted under a single key "fh_db" as a JSON object.
// Every state change triggers a save via useEffect watchers in AppProvider.
// ─────────────────────────────────────────────────────────────────────────────
const DB_KEY='fh_db';

function dbLoad(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(err){
    console.warn('FocusHabit: failed to load saved data',err);
    return null;
  }
}

function dbSave(data){
  try{
    localStorage.setItem(DB_KEY,JSON.stringify(data));
  }catch(err){
    console.warn('FocusHabit: failed to save data',err);
  }
}

function dbClear(){
  try{ localStorage.removeItem(DB_KEY); }catch(e){}
}

// Return how much storage the app is using (in KB)
function dbSize(){
  try{
    const raw=localStorage.getItem(DB_KEY)||'';
    return (new Blob([raw]).size/1024).toFixed(1);
  }catch(e){return '?';}
}


// ─────────────────────────────────────────────────────────────────────────────
// CLOUD SYNC — Cloudflare Worker backend
// After deploying the worker, paste your worker URL below and share the HTML.
// ─────────────────────────────────────────────────────────────────────────────

// ▼▼▼ PASTE YOUR WORKER URL HERE after deploying (e.g. https://focushabit.yourname.workers.dev)
const WORKER_URL = 'https://hidden-cloud-6095.rudraprasadrout39.workers.dev';   // leave empty = cloud sync disabled until configured

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function xorEncode(text,key){
  let o='';
  for(let i=0;i<text.length;i++) o+=String.fromCharCode(text.charCodeAt(i)^key.charCodeAt(i%key.length));
  return btoa(unescape(encodeURIComponent(o)));
}
function xorDecode(b64,key){
  try{
    const enc=decodeURIComponent(escape(atob(b64)));
    let o='';
    for(let i=0;i<enc.length;i++) o+=String.fromCharCode(enc.charCodeAt(i)^key.charCodeAt(i%key.length));
    return JSON.parse(o);
  }catch{return null;}
}

async function workerCall(path,body){
  try{
    const r=await fetch(WORKER_URL+path,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const j=await r.json();
    return{status:r.status,...j};
  }catch(e){return{status:0,error:'Network error — check your connection.'};}
}

async function cloudRegister(email,password){
  if(!WORKER_URL) return{ok:false,error:'Worker URL not configured. See Settings → Cloud Sync → Setup Guide.'};
  const emailNorm=email.trim().toLowerCase();
  const accountId=await sha256(emailNorm);
  const pwHash=await sha256(password+accountId);
  const r=await workerCall('/register',{accountId,pwHash});
  if(r.status===409) return{ok:false,error:'Account already exists. Please log in.'};
  if(r.status!==200) return{ok:false,error:r.error||'Registration failed. Check your Worker URL in Settings.'};
  return{ok:true,accountId,pwHash};
}

async function cloudLogin(email,password){
  if(!WORKER_URL) return{ok:false,error:'Worker URL not configured. See Settings → Cloud Sync → Setup Guide.'};
  const emailNorm=email.trim().toLowerCase();
  const accountId=await sha256(emailNorm);
  const pwHash=await sha256(password+accountId);
  const r=await workerCall('/login',{accountId,pwHash});
  if(r.status===404) return{ok:false,error:'No account found with this email. Sign up first.'};
  if(r.status===401) return{ok:false,error:'Incorrect password.'};
  if(r.status!==200) return{ok:false,error:r.error||'Login failed. Check your Worker URL in Settings.'};
  const data=r.payload?xorDecode(r.payload,pwHash):null;
  return{ok:true,accountId,pwHash,data,email:emailNorm};
}

async function cloudPushData(accountId,pwHash,data){
  if(!WORKER_URL) return false;
  const payload=xorEncode(JSON.stringify(data),pwHash);
  const r=await workerCall('/save',{accountId,pwHash,payload});
  return r.status===200;
}

async function cloudPullData(accountId,pwHash){
  if(!WORKER_URL) return null;
  const r=await workerCall('/load',{accountId,pwHash});
  if(r.status!==200||!r.payload) return null;
  return xorDecode(r.payload,pwHash);
}

const NAV=[
  {id:'home',     icon:'🏠',label:'Home'},
  {id:'habits',   icon:'✅',label:'Habits'},
  {id:'todos',    icon:'📝',label:'To-Do'},
  {id:'goals',    icon:'🎯',label:'Goals'},
  {id:'planner',  icon:'📅',label:'Planner'},
  {id:'calendar', icon:'📆',label:'Calendar'},
  {id:'analytics',icon:'📊',label:'Analytics'},
  {id:'reports',  icon:'📈',label:'Reports'},
  {id:'focus',    icon:'⏱️',label:'Focus'},
  {id:'reminders',icon:'⏰',label:'Reminders'},

  {id:'motivate', icon:'✨',label:'Motivation'},
];

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const todayIdx=()=>(new Date().getDay()+6)%7;
const daysLeft=d=>Math.ceil((new Date(d)-new Date())/(864e5));
const clamp=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));
const pct=(a,b)=>b?Math.min(100,Math.round((a/b)*100)):0;

// ─────────────────────────────────────────────────────────────────────────────
// TOAST CONTEXT
// ─────────────────────────────────────────────────────────────────────────────
const ToastCtx=createContext(null);

function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type='info',duration=2400)=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),duration);
  },[]);
  return e(ToastCtx.Provider,{value:show},
    children,
    e('div',{className:'toast-wrap'},
      toasts.map(t=>e('div',{key:t.id,className:'toast '+t.type},
        t.type==='success'?'✅':t.type==='warn'?'⚠️':'💾',
        t.msg
      ))
    )
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP CONTEXT / STATE
// ─────────────────────────────────────────────────────────────────────────────
const AppCtx=createContext(null);

// Default state (all zeros / empty)
const DEFAULT_STATE={
  habits:[],      // {id,name,color,target,checked:[7 bools],streak}
  subjects:[],    // {id,name,color,targetHrs,loggedHrs}
  exams:[],       // {id,name,date,type}
  pomoDone:0,
  shieldUsed:false,
  savedQuotes:[],
  user:null,
  todos:[],
  goals:[],
  reminders:[],
  theme:'dark',
};

function AppProvider({children}){
  const toast=useContext(ToastCtx);

  // ── LOAD from localStorage on first mount ──────────────────────────────────
  const saved=dbLoad();
  const init=saved?{...DEFAULT_STATE,...saved}:DEFAULT_STATE;

  const [habits,    setHabits]    =useState(init.habits);
  const [subjects,  setSubjects]  =useState(init.subjects);
  const [exams,     setExams]     =useState(init.exams);
  const [pomoDone,  setPomoDone]  =useState(init.pomoDone);
  const [shieldUsed,setShieldUsed]=useState(init.shieldUsed);
  const [savedQuotes,setSavedQuotes]=useState(init.savedQuotes);
  const [user,      setUser]      =useState(init.user);
  const [lastSaved, setLastSaved] =useState(null);
  const [todos,     setTodos]     =useState(init.todos||[]);
  const [goals,     setGoals]     =useState(init.goals||[]);
  const [reminders, setReminders] =useState(init.reminders||[{id:1,label:'Habit Check-in',time:'08:00',type:'habit',on:false},{id:2,label:'Study Session',time:'14:00',type:'study',on:false},{id:3,label:'Pomodoro Break',time:'17:00',type:'pomo',on:false}]);
  const [theme,     setThemeState]=useState(()=>localStorage.getItem('fh_theme')||'dark');
  const [cloudKey,  setCloudKey]  =useState(()=>localStorage.getItem('fh_cloud_key')||null);  // accountId
  const [cloudPwHash,setCloudPwHash]=useState(()=>localStorage.getItem('fh_cloud_pwhash')||null);
  const [syncStatus,setSyncStatus]=useState('idle'); // idle | syncing | synced | error
  const [lastSync,  setLastSync]  =useState(()=>localStorage.getItem('fh_last_sync')||null);

  // ── SAVE to localStorage whenever state changes ────────────────────────────
  useEffect(()=>{
    const data={habits,subjects,exams,pomoDone,shieldUsed,savedQuotes,user,todos,goals,reminders};
    dbSave(data);
    setLastSaved(new Date().toLocaleTimeString());
  },[habits,subjects,exams,pomoDone,shieldUsed,savedQuotes,user,todos,goals,reminders]);

  // Apply theme to body
  useEffect(()=>{
    document.body.className=theme==='dark'?'':'theme-'+theme;
    localStorage.setItem('fh_theme',theme);
  },[theme]);

  const setTheme=(t)=>setThemeState(t);

  // ── DERIVED STATS ──────────────────────────────────────────────────────────
  const tidx=todayIdx();
  const habitsDoneToday =()=> habits.filter(h=>h.checked[tidx]).length;

  const habitCompPct=()=>{
    if(!habits.length) return 0;
    const slots=habits.length*(tidx+1);
    const done=habits.reduce((s,h)=>s+h.checked.slice(0,tidx+1).filter(Boolean).length,0);
    return pct(done,slots);
  };

  const totalStudyHrs   =()=> subjects.reduce((s,x)=>s+x.loggedHrs,0);
  const totalTargetHrs  =()=> subjects.reduce((s,x)=>s+x.targetHrs,0);
  const studyVsTargetPct=()=> pct(totalStudyHrs(),totalTargetHrs());
  const maxStreak       =()=> habits.reduce((m,h)=>Math.max(m,h.streak),0);
  const activeStreaks   =()=> habits.filter(h=>h.streak>0).length;

  const productivityScore=()=>{
    const h=habitCompPct();
    const s=studyVsTargetPct();
    const p=clamp(pomoDone,0,10)*10;
    return Math.round(h*0.5+s*0.3+p*0.2);
  };

  const totalXP=()=>{
    const hxp=habits.reduce((s,h)=>s+h.checked.filter(Boolean).length*10,0);
    const sxp=Math.round(totalStudyHrs()*20);
    const pxp=pomoDone*15;
    return hxp+sxp+pxp;
  };

  const level    =()=> Math.max(1,Math.floor(totalXP()/500)+1);
  const xpInLevel=()=> totalXP()%500;
  const xpPerLvl =()=> 500;

  const unlockedBadges=()=>({
    streak3 : maxStreak()>=3,
    streak7 : maxStreak()>=7,
    habit5  : habits.length>=5,
    alltoday: habits.length>0&&habitsDoneToday()===habits.length,
    exam1   : exams.length>=1,
    subj3   : subjects.length>=3,
    pomo3   : pomoDone>=3,
    score80 : productivityScore()>=80,
  });

  // ── HABIT CRUD ─────────────────────────────────────────────────────────────
  const addHabit=(name,color,target)=>{
    setHabits(hs=>[...hs,{id:Date.now(),name,color,target,checked:Array(7).fill(false),streak:0}]);
    toast('Habit "'+name+'" added!','success');
  };
  const deleteHabit=(id,name)=>{
    setHabits(hs=>hs.filter(h=>h.id!==id));
    toast('Habit "'+name+'" deleted.','warn');
  };
  const toggleHabit=(hid,di)=>{
    setHabits(hs=>hs.map(h=>{
      if(h.id!==hid) return h;
      const nc=[...h.checked]; nc[di]=!nc[di];
      const streak=nc.slice(0,tidx+1).reverse().reduce((s,v)=>v?s+1:0,0);
      return {...h,checked:nc,streak};
    }));
  };

  // ── SUBJECT CRUD ───────────────────────────────────────────────────────────
  const addSubject=(name,color,targetHrs)=>{
    setSubjects(ss=>[...ss,{id:Date.now(),name,color,targetHrs,loggedHrs:0}]);
    toast('Subject "'+name+'" added!','success');
  };
  const deleteSubject=(id,name)=>{
    setSubjects(ss=>ss.filter(s=>s.id!==id));
    toast('Subject "'+name+'" deleted.','warn');
  };
  const logHoursToSubject=(id,hrs)=>{
    setSubjects(ss=>ss.map(s=>s.id===id?{...s,loggedHrs:Math.max(0,parseFloat((s.loggedHrs+hrs).toFixed(2)))}:s));
    toast(hrs+'h study session logged! +'+Math.round(hrs*20)+' XP','success');
  };
  const setSubjectTarget=(id,t)=>{
    setSubjects(ss=>ss.map(s=>s.id===id?{...s,targetHrs:Math.max(1,t)}:s));
  };

  // ── EXAM CRUD ──────────────────────────────────────────────────────────────
  const addExam=(name,date,type)=>{
    setExams(es=>[...es,{id:Date.now(),name,date,type}]);
    toast(type+' "'+name+'" added!','success');
  };
  const deleteExam=(id,name)=>{
    setExams(es=>es.filter(x=>x.id!==id));
    toast('"'+name+'" removed.','warn');
  };

  // ── POMO ───────────────────────────────────────────────────────────────────
  const incrementPomo=()=>{
    setPomoDone(p=>{
      toast('🍅 Pomodoro complete! +15 XP','success');
      return p+1;
    });
  };

  // ── QUOTES ────────────────────────────────────────────────────────────────
  const saveQuote  =(q)=>{ setSavedQuotes(s=>s.find(x=>x.q===q.q)?s:[...s,q]); toast('Quote saved!','info'); };
  const deleteQuote=(i)=>  setSavedQuotes(s=>s.filter((_,idx)=>idx!==i));

  // ── CLOUD SYNC ────────────────────────────────────────────────────────────
  const getPayload=()=>({habits,subjects,exams,pomoDone,shieldUsed,savedQuotes,user,todos,goals,reminders});

  const cloudSyncPush=async()=>{
    if(!cloudKey||!cloudPwHash) return;
    setSyncStatus('syncing');
    const ok=await cloudPushData(cloudKey,cloudPwHash,getPayload());
    if(ok){
      const t=new Date().toLocaleTimeString();
      setSyncStatus('synced');
      setLastSync(t);
      localStorage.setItem('fh_last_sync',t);
    }else{
      setSyncStatus('error');
    }
    setTimeout(()=>setSyncStatus('idle'),3000);
  };

  const cloudSyncPull=async(key,pwHash)=>{
    const k=key||cloudKey;
    const ph=pwHash||cloudPwHash;
    if(!k||!ph) return false;
    setSyncStatus('syncing');
    const d=await cloudPullData(k,ph);
    if(d){
      if(d.habits)     setHabits(d.habits);
      if(d.subjects)   setSubjects(d.subjects);
      if(d.exams)      setExams(d.exams);
      if(typeof d.pomoDone==='number')   setPomoDone(d.pomoDone);
      if(typeof d.shieldUsed==='boolean') setShieldUsed(d.shieldUsed);
      if(d.savedQuotes) setSavedQuotes(d.savedQuotes);
      if(d.user)       setUser(d.user);
      const t=new Date().toLocaleTimeString();
      setSyncStatus('synced');
      setLastSync(t);
      localStorage.setItem('fh_last_sync',t);
      return true;
    }
    setSyncStatus('idle');
    return false;
  };

  const connectCloud=async(accountId,pwHash,email,initialData)=>{
    localStorage.setItem('fh_cloud_key',accountId);
    localStorage.setItem('fh_cloud_pwhash',pwHash);
    localStorage.setItem('fh_cloud_email',email);
    setCloudKey(accountId);
    setCloudPwHash(pwHash);
    // Load cloud data immediately on login
    if(initialData){
      if(initialData.habits)    setHabits(initialData.habits);
      if(initialData.subjects)  setSubjects(initialData.subjects);
      if(initialData.exams)     setExams(initialData.exams);
      if(typeof initialData.pomoDone==='number') setPomoDone(initialData.pomoDone);
      if(initialData.savedQuotes) setSavedQuotes(initialData.savedQuotes);
    }
    const t=new Date().toLocaleTimeString();
    setLastSync(t);
    localStorage.setItem('fh_last_sync',t);
    toast('☁️ Cloud sync connected! Your data is synced across devices.','success');
  };

  const disconnectCloud=()=>{
    localStorage.removeItem('fh_cloud_key');
    localStorage.removeItem('fh_cloud_pwhash');
    localStorage.removeItem('fh_cloud_email');
    localStorage.removeItem('fh_last_sync');
    setCloudKey(null);
    setCloudPwHash(null);
    setSyncStatus('idle');
    setLastSync(null);
    toast('Cloud sync disconnected. Data still saved locally.','warn');
  };

  const cloudEmail=localStorage.getItem('fh_cloud_email')||null;

  // Auto-push to cloud whenever state changes (debounced 2s)
  const pushTimer=useRef(null);
  useEffect(()=>{
    if(!cloudKey||!cloudPwHash) return;
    clearTimeout(pushTimer.current);
    pushTimer.current=setTimeout(()=>cloudSyncPush(),2000);
    return()=>clearTimeout(pushTimer.current);
  },[habits,subjects,exams,pomoDone,shieldUsed,savedQuotes,user,todos,goals,reminders,cloudKey,cloudPwHash]);


  // ── TODO CRUD ─────────────────────────────────────────────────────────────
  const addTodo=(text,priority)=>{
    setTodos(ts=>[...ts,{id:Date.now(),text,priority,done:false,createdAt:Date.now()}]);
    toast('Task added!','success');
  };
  const toggleTodo=(id)=>setTodos(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteTodo=(id)=>setTodos(ts=>ts.filter(t=>t.id!==id));
  const clearDoneTodos=()=>{setTodos(ts=>ts.filter(t=>!t.done));toast('Completed tasks cleared.','info');};

  // ── GOAL CRUD ─────────────────────────────────────────────────────────────
  const addGoal=(title,icon,deadline,milestones)=>{
    setGoals(gs=>[...gs,{id:Date.now(),title,icon,deadline,milestones:milestones.map((m,i)=>({id:i+1,text:m,done:false}))}]);
    toast('Goal added!','success');
  };
  const deleteGoal=(id)=>setGoals(gs=>gs.filter(g=>g.id!==id));
  const toggleMilestone=(gid,mid)=>{
    setGoals(gs=>gs.map(g=>g.id!==gid?g:{...g,milestones:g.milestones.map(m=>m.id===mid?{...m,done:!m.done}:m)}));
  };

  // ── REMINDER CRUD ─────────────────────────────────────────────────────────
  const toggleReminder=(id)=>{
    setReminders(rs=>rs.map(r=>{
      if(r.id!==id) return r;
      const updated={...r,on:!r.on};
      if(updated.on) scheduleReminder(updated);
      return updated;
    }));
  };
  const updateReminderTime=(id,time)=>setReminders(rs=>rs.map(r=>r.id===id?{...r,time}:r));
  const addReminder=(label,time,type)=>{
    const nr={id:Date.now(),label,time,type,on:false};
    setReminders(rs=>[...rs,nr]);
    toast('Reminder added!','success');
  };
  const deleteReminder=(id)=>setReminders(rs=>rs.filter(r=>r.id!==id));

  // ── RESET ALL DATA ────────────────────────────────────────────────────────
  const resetAllData=()=>{
    setHabits([]);setSubjects([]);setExams([]);setPomoDone(0);
    setShieldUsed(false);setSavedQuotes([]);setTodos([]);setGoals([]);
    dbClear();
    toast('All data cleared.','warn');
  };

  const ctx={
    habits,subjects,exams,pomoDone,setPomoDone:incrementPomo,shieldUsed,setShieldUsed,
    savedQuotes,user,setUser,lastSaved,
    todos,goals,reminders,theme,setTheme,
    cloudKey,cloudEmail,syncStatus,lastSync,
    cloudSyncPush,cloudSyncPull,connectCloud,disconnectCloud,
    addTodo,toggleTodo,deleteTodo,clearDoneTodos,
    addGoal,deleteGoal,toggleMilestone,
    toggleReminder,updateReminderTime,addReminder,deleteReminder,
    addHabit,deleteHabit,toggleHabit,
    addSubject,deleteSubject,logHoursToSubject,setSubjectTarget,
    addExam,deleteExam,saveQuote,deleteQuote,resetAllData,
    habitsDoneToday,habitCompPct,
    totalStudyHrs,totalTargetHrs,studyVsTargetPct,
    maxStreak,activeStreaks,productivityScore,
    totalXP,level,xpInLevel,xpPerLvl,unlockedBadges,
    dbSize,
  };
  return e(AppCtx.Provider,{value:ctx},children);
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────────────────────
function Modal({title,onClose,children}){
  useEffect(()=>{
    const h=ev=>ev.key==='Escape'&&onClose();
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[]);
  return e('div',{className:'modal-bg',onClick:ev=>ev.target===ev.currentTarget&&onClose()},
    e('div',{className:'modal'},e('h3',null,title),children)
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// STORAGE STATUS BAR (shown on every page)
// ─────────────────────────────────────────────────────────────────────────────
function StorageBar(){
  const ctx=useContext(AppCtx);
  const statusMap={
    idle:   {dot:'',     text: ctx.cloudKey?'☁️ Cloud sync on · '+ctx.cloudEmail:'💾 Local only'},
    syncing:{dot:'syncing',text:'☁️ Syncing…'},
    synced: {dot:'',     text:'☁️ Synced · '+ctx.lastSync},
    error:  {dot:'error',text:'☁️ Sync failed — check connection'},
  };
  const s=statusMap[ctx.syncStatus]||statusMap.idle;
  return e('div',{className:'storage-bar',style:ctx.cloudKey?{background:'rgba(108,99,255,.07)',border:'1px solid rgba(108,99,255,.18)'}:{}},
    e('div',{className:'storage-dot'+(s.dot?' '+s.dot:'')}),
    e('span',null,s.text),
    e('span',{style:{marginLeft:'auto',display:'flex',gap:14}},
      e('span',null,ctx.dbSize()+' KB'),
      ctx.lastSaved&&!ctx.cloudKey&&e('span',null,ctx.lastSaved)
    )
  );
}

      ),

              g.label,e('br'),e('small',{style:{color:'var(--muted)',fontSize:'.7rem'}},g.desc)
            ))
          ),
          e('button',{className:'ob-btn',style:{marginTop:20,opacity:goals.length===3?1:.45},
            onClick:()=>goals.length===3&&onDone({email,goals})},'Start my journey 🚀')
        )

}

  const ctx=useContext(AppCtx);
  const tidx=todayIdx();
  const dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const score=ctx.productivityScore();
  const nextExam=[...ctx.exams].filter(ex=>daysLeft(ex.date)>=0).sort((a,b)=>daysLeft(a.date)-daysLeft(b.date))[0];
  const doneToday=ctx.habitsDoneToday();
  const totalHabits=ctx.habits.length;
  const studyHrs=ctx.totalStudyHrs();
  const name=user?.email&&user.email!=='Guest'?user.email.split('@')[0]:null;

  return e('div',{className:'fade-in'},
    e(StorageBar),
    e('div',{className:'page-header'},
      e('div',{className:'page-title'},'Good day'+(name?', '+name:'')+' 👋'),
      e('div',{className:'page-sub'},dateStr)
    ),
    e('div',{className:'grid-4',style:{marginBottom:16}},
      e('div',{className:'stat-card'},
        e('div',{className:'stat-value',style:{color:'var(--accent)'}},totalHabits===0?'—':doneToday+'/'+totalHabits),
        e('div',{className:'stat-label'},'Habits Today'),
        e('div',{className:'stat-sub'},totalHabits>0?pct(doneToday,totalHabits)+'% done':'Add habits to track')
      ),
      e('div',{className:'stat-card'},
        e('div',{className:'stat-value',style:{color:'var(--accent3)'}},studyHrs===0?'0h':studyHrs.toFixed(1)+'h'),
        e('div',{className:'stat-label'},'Study This Week'),
        e('div',{className:'stat-sub'},ctx.totalTargetHrs()>0?'Target: '+ctx.totalTargetHrs()+'h':'Set targets in Planner')
      ),
      e('div',{className:'stat-card'},
        e('div',{className:'stat-value',style:{color:score>=80?'var(--accent3)':score>=50?'var(--accent4)':'var(--accent2)'}},score),
        e('div',{className:'stat-label'},'Productivity Score'),

// STUDY PLANNER
// ─────────────────────────────────────────────────────────────────────────────
function StudyPlanner(){
  const ctx=useContext(AppCtx);
  const [showAdd,setShowAdd]=useState(false);
  const [logModal,setLogModal]=useState(null);
  const [logHrs,setLogHrs]=useState('');
  const [form,setForm]=useState({name:'',targetHrs:8,color:COLORS[0]});
  const tidx=todayIdx();

  const plan=Array(7).fill(null).map(()=>[]);
  ctx.subjects.forEach((s,si)=>{
    const days=Math.min(7,Math.max(1,Math.round(s.targetHrs/2)));
    for(let d=0;d<days;d++) plan[(si*2+d)%7].push(s);
  });

  const addSubject=()=>{
    if(!form.name.trim()) return;
    ctx.addSubject(form.name.trim(),form.color,form.targetHrs);
    setShowAdd(false);
    setForm({name:'',targetHrs:8,color:COLORS[0]});
  };

  const doLog=()=>{
    const h=parseFloat(logHrs);
    if(isNaN(h)||h<=0) return;
    ctx.logHoursToSubject(logModal,h);
    setLogModal(null);setLogHrs('');
  };

  return e('div',{className:'fade-in'},
    e(StorageBar),
    e('div',{className:'page-header'},
      e('div',{className:'page-title'},'Study Planner'),
      e('div',{className:'page-sub'},'Log study sessions · track weekly targets · auto weekly plan')

    e('div',{className:'grid-2',style:{marginBottom:16}},

        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
          e('div',{className:'card-title',style:{margin:0}},'Subjects ('+ctx.subjects.length+')'),
          e('button',{className:'btn-primary',style:{padding:'7px 16px',width:'auto',fontSize:'.82rem'},onClick:()=>setShowAdd(true)},'+ Add Subject')

        ctx.subjects.length===0

              e('div',{className:'es-icon'},'📖'),
              e('div',{className:'es-title'},'No subjects added'),
              e('div',{className:'es-hint'},'Add subjects, then log hours after each session. Progress is saved automatically.')
            )
          : ctx.subjects.map(s=>{
              const p=pct(s.loggedHrs,s.targetHrs);
              return e('div',{key:s.id,className:'subject-row'},
                e('div',{className:'subj-dot',style:{background:s.color}}),
                e('div',{style:{flex:1,minWidth:0}},
                  e('div',{className:'subj-name'},s.name),
                  e('div',{style:{display:'flex',alignItems:'center',gap:6,marginTop:4}},
                    e('div',{style:{flex:1,background:'var(--border)',borderRadius:99,height:5,overflow:'hidden'}},
                      e('div',{style:{width:p+'%',height:'100%',background:s.color,borderRadius:99,transition:'width .6s ease'}})

                    e('span',{style:{fontSize:'.7rem',color:'var(--muted)',whiteSpace:'nowrap'}},s.loggedHrs.toFixed(1)+'h / '+s.targetHrs+'h ('+p+'%)')
                  )

                },'+ Log'),
                e('button',{className:'del-btn',title:'Remove',onClick:()=>ctx.deleteSubject(s.id,s.name)},'✕')

      e('div',{className:'card'},
        e('div',{className:'card-title'},'Weekly Hour Targets'),
        ctx.subjects.length===0

          : e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
              ctx.subjects.map(s=>e('div',{key:s.id,style:{display:'flex',alignItems:'center',gap:8}},
                e('div',{className:'subj-dot',style:{background:s.color}}),

                e('span',{style:{fontSize:'.78rem',color:'var(--muted)'}},'h/wk')
              ))
            )
      )
    ),
    e('div',{className:'card'},
      e('div',{className:'card-title'},'Auto Weekly Plan'),
      ctx.subjects.length===0
        ? e('div',{className:'empty-state'},
            e('div',{className:'es-icon'},'📅'),

      e('div',{style:{fontSize:'.75rem',color:'var(--muted)',marginBottom:4}},'Adds to logged hours · updates score · awards XP · saved automatically.'),
      e('div',{className:'row-btns'},
        e('button',{className:'btn-ghost',onClick:()=>setLogModal(null)},'Cancel'),
        e('button',{className:'btn-primary',disabled:!logHrs||isNaN(+logHrs)||+logHrs<=0,onClick:doLog},'Log Hours')
      )
    ),
    showAdd&&e(Modal,{title:'Add Subject',onClose:()=>setShowAdd(false)},
      e('div',{className:'form-group'},
        e('label',{className:'form-label'},'Subject Name'),
        e('input',{className:'form-input',placeholder:'e.g. DSA, Physics, Java',value:form.name,autoFocus:true,
          onChange:ev=>setForm(f=>({...f,name:ev.target.value})),
          onKeyDown:ev=>ev.key==='Enter'&&addSubject()})
      ),
      e('div',{className:'form-group'},
        e('label',{className:'form-label'},'Weekly Target Hours'),

        e('button',{className:'btn-primary',disabled:!form.name.trim(),onClick:addSubject},'Add Subject')

}

function CalendarSync(){
  const ctx=useContext(AppCtx);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({name:'',date:'',type:'exam'});
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  const firstDay=(new Date(yr,mo,1).getDay()+6)%7;
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const examDateSet=new Set(ctx.exams.map(ex=>{const d=new Date(ex.date);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}));

  const addExam=()=>{
    if(!form.name.trim()||!form.date) return;
    ctx.addExam(form.name.trim(),form.date,form.type);
    setShowAdd(false);setForm({name:'',date:'',type:'exam'});
  };

  const sorted=[...ctx.exams].sort((a,b)=>new Date(a.date)-new Date(b.date));

  return e('div',{className:'fade-in'},
    e(StorageBar),
    e('div',{className:'page-header'},
      e('div',{className:'page-title'},'Calendar & Exam Sync'),
      e('div',{className:'page-sub'},'Add exams & deadlines · auto-highlight on calendar')
    ),
    e('div',{className:'grid-2'},
      e('div',{className:'card'},
        e('div',{className:'card-title'},now.toLocaleString('default',{month:'long',year:'numeric'})),
        e('div',{className:'mini-calendar'},
          ['M','T','W','T','F','S','S'].map((d,i)=>e('div',{key:i,className:'mc-head'},d)),
          Array(firstDay).fill(0).map((_,i)=>e('div',{key:'p'+i,className:'mc-day'})),
          Array(daysInMonth).fill(0).map((_,i)=>{
            const day=i+1;
            const isToday=day===now.getDate();
            const key=yr+'-'+(mo+1)+'-'+day;
            const hasExam=examDateSet.has(key);
            const studyBlk=!hasExam&&!isToday&&day%3===0;
            return e('div',{key:day,className:'mc-day'+(isToday?' today':hasExam?' has-exam':studyBlk?' study-block':'')},day);
          })
        ),
        e('div',{style:{display:'flex',gap:12,marginTop:10,fontSize:'.72rem',color:'var(--muted)',flexWrap:'wrap'}},
          e('span',null,'🔴 Exam'),e('span',null,'🔵 Study Block'),e('span',null,'🟣 Today')
        )
      ),
      e('div',{className:'card'},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
          e('div',{className:'card-title',style:{margin:0}},'Upcoming ('+ctx.exams.length+')'),
          e('button',{className:'btn-primary',style:{padding:'7px 14px',width:'auto',fontSize:'.82rem'},onClick:()=>setShowAdd(true)},'+ Add')
        ),
        ctx.exams.length===0
          ? e('div',{className:'empty-state'},
              e('div',{className:'es-icon'},'📅'),
              e('div',{className:'es-title'},'No exams added'),
              e('div',{className:'es-hint'},'Add exam dates and deadlines. They will be highlighted on the calendar and saved.')
            )
          : sorted.map(ex=>{
              const dl=daysLeft(ex.date);
              return e('div',{key:ex.id,className:'exam-item'},
                e('div',{style:{flex:1,minWidth:0}},
                  e('div',{className:'exam-name'},ex.name),
                  e('div',{className:'exam-date-lbl'},new Date(ex.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+ex.type)
                ),
                e('div',{style:{display:'flex',alignItems:'center',gap:8}},
                  e('div',{className:'exam-days-left'+(dl<=5?' soon':'')},dl>=0?dl+'d left':'Past'),
                  e('button',{className:'del-btn',onClick:()=>ctx.deleteExam(ex.id,ex.name)},'✕')
                )
              );
            })
      )
    ),
    showAdd&&e(Modal,{title:'Add Exam / Deadline',onClose:()=>setShowAdd(false)},
      e('div',{className:'form-group'},e('label',{className:'form-label'},'Name'),
        e('input',{className:'form-input',placeholder:'e.g. DSA Final Exam',value:form.name,autoFocus:true,onChange:ev=>setForm(f=>({...f,name:ev.target.value}))})),
      e('div',{className:'form-group'},e('label',{className:'form-label'},'Date'),
        e('input',{className:'form-input',type:'date',value:form.date,onChange:ev=>setForm(f=>({...f,date:ev.target.value}))})),
      e('div',{className:'form-group'},e('label',{className:'form-label'},'Type'),
        e('select',{className:'form-input',value:form.type,onChange:ev=>setForm(f=>({...f,type:ev.target.value}))},
          e('option',{value:'exam'},'Exam'),e('option',{value:'deadline'},'Deadline'),e('option',{value:'quiz'},'Quiz')
        )
      ),
      e('div',{className:'row-btns'},
        e('button',{className:'btn-ghost',onClick:()=>setShowAdd(false)},'Cancel'),
        e('button',{className:'btn-primary',disabled:!form.name.trim()||!form.date,onClick:addExam},'Add')

// FOCUS MODE
// ─────────────────────────────────────────────────────────────────────────────
function FocusMode(){
  const ctx=useContext(AppCtx);
  const WORK=25*60,BREAK=5*60;
  const [running,setRunning]=useState(false);
  const [isBreak,setIsBreak]=useState(false);
  const [time,setTime]=useState(WORK);
  const [dnd,setDnd]=useState(false);
  const interval=useRef(null);
  const total=isBreak?BREAK:WORK;
  const pctLeft=time/total;
  const r=90,circ=2*Math.PI*r;
  const mm=String(Math.floor(time/60)).padStart(2,'0');
  const ss=String(time%60).padStart(2,'0');

  useEffect(()=>{
    if(running){
      interval.current=setInterval(()=>{
        setTime(t=>{
          if(t<=1){
            clearInterval(interval.current);setRunning(false);
            if(!isBreak){ctx.setPomoDone();setIsBreak(true);setTime(BREAK);}
            else{setIsBreak(false);setTime(WORK);}
            return 0;
          }return t-1;
        });
      },1000);
    }else clearInterval(interval.current);
    return()=>clearInterval(interval.current);
  },[running,isBreak]);

  const reset=()=>{setRunning(false);setIsBreak(false);setTime(WORK);};

  return e('div',{className:'fade-in'},
    e(StorageBar),
    e('div',{className:'page-header'},
      e('div',{className:'page-title'},'Focus Mode'),
      e('div',{className:'page-sub'},'Pomodoro timer · 25 min work + 5 min break · session count saved')
    ),
    e('div',{className:'grid-2'},
      e('div',{className:'card'},
        e('div',{className:'pomo-wrap'},
          e('div',{className:'pomo-ring'},
            e('svg',{width:210,height:210,viewBox:'0 0 220 220'},
              e('circle',{cx:110,cy:110,r:r,fill:'none',stroke:'var(--border)',strokeWidth:12}),
              e('circle',{cx:110,cy:110,r:r,fill:'none',
                stroke:isBreak?'var(--accent3)':'var(--accent)',
                strokeWidth:12,strokeDasharray:circ,
                strokeDashoffset:circ*(1-pctLeft),
                strokeLinecap:'round',
                style:{transition:'stroke-dashoffset .5s linear'}})
            ),
            e('div',{className:'pomo-center'},
              e('div',{className:'pomo-time'},mm+':'+ss),
              e('div',{className:'pomo-mode'},isBreak?'☕ Break':'🎯 Focus')
            )
          ),
          e('div',{className:'pomo-dots'},
            Array(4).fill(0).map((_,i)=>e('div',{key:i,className:'pomo-dot'+(i<ctx.pomoDone%4?' done':'')}))
          ),
          e('div',{className:'pomo-btns'},
            e('button',{className:'pomo-btn start',onClick:()=>setRunning(r=>!r)},running?'⏸ Pause':'▶ Start'),
            e('button',{className:'pomo-btn reset',onClick:reset},'↺ Reset')
          ),
          e('div',{style:{textAlign:'center',fontSize:'.83rem',color:'var(--muted)'}},
            e('b',{style:{color:'var(--accent4)',fontFamily:'var(--font-head)',fontSize:'1rem'}},ctx.pomoDone),
            ' total sessions · saved automatically'
          )
        )
      ),
      e('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        e('div',{className:'card'},
          e('div',{className:'card-title'},'Do Not Disturb'),
          e('div',{className:'dnd-banner'},
            dnd
              ? e('div',null,e('b',{style:{color:'var(--accent3)'}},'🔕 DND Active'),e('br'),e('span',{style:{fontSize:'.82rem',color:'var(--muted)'}},'Stay in the zone.'))
              : e('span',{style:{fontSize:'.86rem',color:'var(--muted)'}},'Enable DND to block distractions during focus sessions.')
          ),
          e('button',{className:'pomo-btn'+(dnd?' reset':' start'),style:{width:'100%',marginTop:12,borderRadius:8},onClick:()=>setDnd(d=>!d)},
            dnd?'🔔 Disable DND':'🔕 Enable DND')
        ),
        e('div',{className:'card'},
          e('div',{className:'card-title'},'Session Tips'),
          ['Put your phone face-down','Close social media tabs','Drink water before starting','Set one clear goal for this session'].map((t,i)=>

// CLOUD AUTH — Sign up / Login modal
// ─────────────────────────────────────────────────────────────────────────────
function CloudAuth({onClose}){
  const ctx=useContext(AppCtx);
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');

  const handle=async()=>{
    setErr('');setOk('');
    if(!email.includes('@')) return setErr('Please enter a valid email address.');
    if(pw.length<6) return setErr('Password must be at least 6 characters.');
    if(tab==='signup'&&pw!==pw2) return setErr('Passwords do not match.');
    setLoading(true);
    if(tab==='signup'){
      const r=await cloudRegister(email,pw);
      if(!r.ok){setErr(r.error);setLoading(false);return;}
      await ctx.connectCloud(r.accountId,r.pwHash,email.trim().toLowerCase(),null);
      setOk('Account created & cloud sync enabled! ✅');
      setTimeout(()=>onClose(),1600);
    }else{
      const r=await cloudLogin(email,pw);
      if(!r.ok){setErr(r.error);setLoading(false);return;}
      await ctx.connectCloud(r.accountId,r.pwHash,r.email,r.data);
      setOk('Logged in! Your data has been synced. ✅');
      setTimeout(()=>onClose(),1600);
    }
    setLoading(false);
  };

  return e(Modal,{title:'☁️ Cloud Sync Account',onClose},
    e('div',{className:'auth-tabs',style:{marginTop:12}},
      ['login','signup'].map(t=>e('div',{key:t,className:'auth-tab'+(tab===t?' act':''),
        onClick:()=>{setTab(t);setErr('');setOk('');}},
        t==='login'?'🔑 Log In':'✨ Sign Up'
      ))
    ),
    err&&e('div',{className:'auth-err'},err),
    ok&&e('div',{className:'auth-ok'},ok),
    !ok&&e('div',null,
      e('input',{className:'auth-input',type:'email',placeholder:'Email address',value:email,
        onChange:ev=>setEmail(ev.target.value),autoFocus:true,
        onKeyDown:ev=>ev.key==='Enter'&&handle()}),
      e('input',{className:'auth-input',type:'password',placeholder:'Password (min 6 chars)',value:pw,
        onChange:ev=>setPw(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&handle()}),
      tab==='signup'&&e('input',{className:'auth-input',type:'password',placeholder:'Confirm password',value:pw2,
        onChange:ev=>setPw2(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&handle()}),
      e('button',{className:'auth-btn',onClick:handle,disabled:loading||!email||!pw},
        loading?'Please wait…':tab==='login'?'Log In & Sync Data':'Create Account & Enable Sync'
      ),
      e('div',{style:{marginTop:14,fontSize:'.78rem',color:'var(--muted)',lineHeight:1.5,textAlign:'center'}},
        '🔒 Password hashed with SHA-256 — we never see your data or password.'
      )
    )
  );
}

// REMINDER SCHEDULER
// ─────────────────────────────────────────────────────────────────────────────
function scheduleReminder(r){
  if(!('Notification' in window)) return;
  if(Notification.permission!=='granted') return;
  const [h,m]=r.time.split(':').map(Number);
  const now=new Date();
  const target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now) target.setDate(target.getDate()+1);
  const ms=target-now;
  setTimeout(()=>{
    new Notification('FocusHabit — '+r.label,{body:'Time for: '+r.label,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">🎯</text></svg>'});
  },ms);
}

// GOAL TRACKER PAGE

function GoalTracker(){
  const ctx=useContext(AppCtx);
  const [showModal,setShowModal]=useState(false);
  const [title,setTitle]=useState('');
  const [icon,setIcon]=useState('🎯');
  const [deadline,setDeadline]=useState('');
  const [msText,setMsText]=useState('');

  const ICONS=['🎯','📚','💪','🏆','💻','🌟','🎓','🚀','❤️','🧘'];

  const add=()=>{
    if(!title.trim()) return;
    const milestones=msText.split('\n').map(s=>s.trim()).filter(Boolean);
    ctx.addGoal(title.trim(),icon,deadline,milestones.length?milestones:['Complete goal']);
    setTitle('');setIcon('🎯');setDeadline('');setMsText('');setShowModal(false);
  };

  return e('div',{className:'fade-in'},
    e(StorageBar),
    e('div',{className:'page-header'},
      e('div',{className:'page-title'},'🎯 Goal Tracker'),
      e('div',{className:'page-sub'},'Long-term goals with milestones and deadlines')
    ),

    e('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:12}},
      e('button',{className:'add-btn',style:{margin:0,width:'auto',padding:'9px 18px'},onClick:()=>setShowModal(true)},'+ New Goal')
    ),

    ctx.goals.length===0
      ? e('div',{className:'card'},e('div',{className:'empty-state'},e('div',{className:'es-icon'},'🎯'),e('div',{className:'es-title'},'No goals yet'),e('div',{className:'es-hint'},'Set your first long-term goal and break it into milestones')))
      : ctx.goals.map(g=>{
          const done=g.milestones.filter(m=>m.done).length;
          const total=g.milestones.length;
          const progress=total?Math.round((done/total)*100):0;
          const dl=g.deadline?daysLeft(g.deadline):null;
          return e('div',{key:g.id,className:'goal-item'},
            e('div',{className:'goal-header'},
              e('div',{className:'goal-icon'},g.icon),
              e('div',{className:'goal-title-text'},g.title),
              dl!==null&&e('div',{className:'goal-deadline',style:{color:dl<7?'var(--accent2)':'var(--muted)'}},

              e('button',{className:'del-btn',onClick:()=>ctx.deleteGoal(g.id)},'✕')
            ),
            e('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.78rem',color:'var(--muted)',marginBottom:5}},
              e('span',null,'Progress: '+done+'/'+total+' milestones'),
              e('span',{style:{color:progress===100?'var(--accent3)':'var(--accent)'}},progress+'%')
            ),
            e('div',{className:'goal-progress-bar'},e('div',{className:'goal-progress-fill',style:{width:progress+'%'}})),
            e('div',null,
              g.milestones.map(m=>e('div',{key:m.id,className:'milestone-item'},
                e('div',{className:'milestone-cb'+(m.done?' done':''),onClick:()=>ctx.toggleMilestone(g.id,m.id)},m.done?'✓':''),
                e('span',{style:{textDecoration:m.done?'line-through':'none'}},m.text)
              ))
            )
          );
        }),

    showModal&&e(Modal,{title:'New Goal',onClose:()=>setShowModal(false)},
      e('div',{style:{marginTop:10}}),
      e('div',{style:{marginBottom:8,fontSize:'.82rem',color:'var(--muted)'}},'Icon'),
      e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}},
        ICONS.map(ic=>e('button',{key:ic,
          style:{fontSize:'1.3rem',padding:'5px',borderRadius:8,border:'2px solid '+(icon===ic?'var(--accent)':'transparent'),background:icon===ic?'rgba(108,99,255,.15)':'transparent',cursor:'pointer'},
          onClick:()=>setIcon(ic)},ic))
      ),
      e('input',{className:'modal-input',placeholder:'Goal title (e.g. Learn Python)',value:title,onChange:ev=>setTitle(ev.target.value),style:{marginBottom:8}}),
      e('input',{className:'modal-input',type:'date',value:deadline,onChange:ev=>setDeadline(ev.target.value),style:{marginBottom:8}}),
      e('div',{style:{fontSize:'.82rem',color:'var(--muted)',marginBottom:4}},'Milestones (one per line)'),

}

            e('span',{style:{fontSize:'.88rem',color:'var(--accent2)',fontWeight:600}},'Are you sure? This cannot be undone.'),

              onClick:()=>{ctx.resetAllData();setConfirmReset(false);},
              style:{background:'var(--accent2)',color:'#fff',border:'none',borderRadius:8,padding:'9px 16px',fontWeight:700,fontSize:'.88rem',cursor:'pointer'}
            },'Yes, delete everything'),
            e('button',{
              onClick:()=>setConfirmReset(false),
              style:{background:'var(--surface2)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,padding:'9px 16px',fontSize:'.88rem',cursor:'pointer'}
            },'Cancel')
          )
    )
  );
}

// ROOT APP — checks localStorage for existing session
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  // If a saved user exists, skip onboarding
  const savedDb=dbLoad();
  const [onboarded,setOnboarded]=useState(!!savedDb?.user);
  const [user,setUser]=useState(savedDb?.user||null);

  return e(ToastProvider,null,
    e(AppProvider,null,
      e(AppShellOrOnboarding,{onboarded,user,setOnboarded,setUser})
    ),
    e(InstallBanner)
  );
}

// Separate component so it can access AppCtx to set user on first login
function AppShellOrOnboarding({onboarded,user,setOnboarded,setUser}){
  const ctx=useContext(AppCtx);
  const handleDone=(u)=>{
    ctx.setUser(u);
    setUser(u);
    setOnboarded(true);
  };
  return onboarded
    ? e(AppShell,{user})
    : e(Onboarding,{onDone:handleDone});
}

// PWA — SERVICE WORKER (offline support)
// ─────────────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='focushabit-v1';
const FILES=['/'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES).catch(()=>{}))));
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(res&&res.status===200&&res.type==='basic'){
      const rc=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,rc));
    }
    return res;
  }).catch(()=>caches.match('/'))));
});
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
  `;
  const swBlob=new Blob([swCode],{type:'application/javascript'});
  const swURL=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}

// ─────────────────────────────────────────────────────────────────────────────
// INSTALL BANNER — shows on first visit if browser supports PWA install
// ─────────────────────────────────────────────────────────────────────────────
let _deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',ev=>{
  ev.preventDefault();
  _deferredInstallPrompt=ev;
  window.__pwaInstallReady=true;
  window.dispatchEvent(new Event('pwaready'));
});

function InstallBanner({onDismiss}){
  const [visible,setVisible]=useState(false);
  const [installing,setInstalling]=useState(false);

  useEffect(()=>{
    // Show if browser fires beforeinstallprompt
    const onReady=()=>setVisible(true);
    window.addEventListener('pwaready',onReady);
    if(window.__pwaInstallReady) setVisible(true);
    // Also show on iOS (no beforeinstallprompt)
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone;
    if(isIOS) setVisible(true);
    return()=>window.removeEventListener('pwaready',onReady);
  },[]);

  const dismiss=()=>{setVisible(false);sessionStorage.setItem('fh_banner_dismissed','1');onDismiss&&onDismiss();};

  if(!visible||sessionStorage.getItem('fh_banner_dismissed')) return null;

  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

  const handleInstall=async()=>{
    if(_deferredInstallPrompt){
      setInstalling(true);
      _deferredInstallPrompt.prompt();
      const{outcome}=await _deferredInstallPrompt.userChoice;
      if(outcome==='accepted'){_deferredInstallPrompt=null;setVisible(false);}
      setInstalling(false);
    }
  };

  return e('div',{className:'install-banner'},
    e('div',{className:'install-banner-icon'},'📲'),
    e('div',{className:'install-banner-text'},
      e('div',{className:'install-banner-title'},'Install FocusHabit on your device'),
      e('div',{className:'install-banner-sub'},isIOS
        ? 'Tap the Share button → "Add to Home Screen" to install'
        :'Works offline · lives in your taskbar/home screen · no app store needed')
    ),
    e('div',{className:'install-banner-btns'},
      !isIOS&&_deferredInstallPrompt&&e('button',{className:'install-banner-btn primary',onClick:handleInstall,disabled:installing},
        installing?'Installing…':'⬇ Install Now'
      ),
      e('button',{className:'install-banner-btn sec',onClick:dismiss},'Not now')
    )
  );
}

function InstallGuide(){
  const [platform,setPlatform]=useState('windows');
  const platforms=[
    {id:'windows', label:'🖥 Windows'},
    {id:'mac',     label:'🍎 Mac'},
    {id:'android', label:'🤖 Android'},
    {id:'ios',     label:'📱 iPhone'},
  ];

  const steps={
    windows:[
      {num:1,title:'Open in Edge or Chrome',detail:'Microsoft Edge gives the smoothest install experience on Windows.'},
      {num:2,title:'Look for the install icon',detail:'In Edge: click ⋯ → Apps → "Install FocusHabit". In Chrome: click the install icon (⊕) in the address bar.'},
      {num:3,title:'Click "Install"',detail:'A confirmation dialog appears. Click Install and the app opens in its own window.'},
      {num:4,title:'Find it in Start Menu',detail:'FocusHabit appears in your Start Menu and taskbar, just like any Windows app. Pin it for easy access.'},
    ],
    mac:[
      {num:1,title:'Open in Chrome or Edge',detail:'Safari on Mac does not support PWA install. Use Chrome or Edge for the best experience.'},
      {num:2,title:'Click the install icon',detail:'In Chrome: click the ⊕ icon in the address bar. In Edge: click ⋯ → Apps → "Install FocusHabit".'},
      {num:3,title:'Click "Install"',detail:'The app opens in a standalone window without browser UI.'},
      {num:4,title:'Find it in Applications',detail:'FocusHabit is added to /Applications and your Dock. You can launch it like any Mac app.'},
    ],
    android:[
      {num:1,title:'Open in Chrome',detail:'Open FocusHabit in Google Chrome on your Android phone or tablet.'},
      {num:2,title:'Tap the banner or menu',detail:'Chrome will show an "Add to Home Screen" banner at the bottom, or tap ⋮ → "Add to Home screen".'},
      {num:3,title:'Tap "Add"',detail:'Confirm by tapping Add. The app icon appears on your home screen.'},
      {num:4,title:'Launch like a native app',detail:'FocusHabit opens fullscreen with no browser UI. Works offline too!'},
    ],
    ios:[
      {num:1,title:'Open in Safari',detail:'PWA install on iPhone/iPad only works through Safari — not Chrome or Firefox.'},
      {num:2,title:'Tap the Share button',detail:'Tap the Share icon (□↑) at the bottom of the screen (or top on iPad).'},
      {num:3,title:'Tap "Add to Home Screen"',detail:'Scroll down in the share sheet and tap "Add to Home Screen".'},
      {num:4,title:'Tap "Add"',detail:'Confirm by tapping Add. The FocusHabit icon appears on your home screen like a real app.'},
    ],
  };

  const [canInstall,setCanInstall]=useState(!!window.__pwaInstallReady);
  const [installing,setInstalling]=useState(false);
  useEffect(()=>{
    const h=()=>setCanInstall(true);
    window.addEventListener('pwaready',h);
    return()=>window.removeEventListener('pwaready',h);
  },[]);

  const handleInstall=async()=>{
    if(_deferredInstallPrompt){
      setInstalling(true);
      _deferredInstallPrompt.prompt();
      const{outcome}=await _deferredInstallPrompt.userChoice;
      if(outcome==='accepted') _deferredInstallPrompt=null;
      setInstalling(false);
    }
  };

  return e('div',{className:'card',style:{marginBottom:16}},
    e('div',{className:'card-title'},'📲 Install as App'),
    e('div',{style:{fontSize:'.86rem',color:'var(--muted)',marginBottom:16}},'Install FocusHabit on your device for a native app experience — works offline, lives in your taskbar or home screen, no app store needed.'),

    // One-click install button if browser supports it
    canInstall&&e('button',{
      className:'btn-primary',
      style:{width:'auto',padding:'11px 22px',marginBottom:18,background:'var(--accent3)',color:'#0a0b0f'},
      onClick:handleInstall,disabled:installing
    },installing?'Installing…':'⚡ Install Now (One Click)'),

    // Platform tabs
    e('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      platforms.map(p=>e('button',{key:p.id,className:'platform-tab'+(platform===p.id?' act':''),onClick:()=>setPlatform(p.id)},p.label))
    ),

    // Steps
    e('div',null,
      steps[platform].map(s=>e('div',{key:s.num,className:'install-step'},
        e('div',{className:'install-step-num'},s.num),
        e('div',{className:'install-step-text'},
          e('b',null,s.title),e('br'),
          e('span',null,s.detail)
        )
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
